# Netlify Configuration
# This tells Netlify how to build and deploy your frontend

[build]
  # Command to build your app
  command = "npm run build"
  
  # Directory to publish (build output)
  publish = "dist"

# Environment variables (can also set in Netlify UI)
[build.environment]
  # Node version
  NODE_VERSION = "18"

# Redirects for Single Page Application (SPA)
# This ensures all routes work correctly with React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Development context (for preview branches)
[context.deploy-preview]
  command = "npm run build"

# Production context
[context.production]
  command = "npm run build"
